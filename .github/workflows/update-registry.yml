name: Update Dataset Registry

on:
  schedule:
    # Every Monday at 8:00 UTC
    - cron: '0 8 * * 1'
  workflow_dispatch:  # Allow manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update-registry:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas requests

      - name: Scan for new datasets based on registry diseases
        run: |
          python3 -c "
          import pandas as pd
          import subprocess, sys

          # Extract unique disease terms from the existing registry
          df = pd.read_csv('dataset_registry.csv')
          diseases = set()
          for d in df['disease'].dropna().unique():
              for term in d.split(';'):
                  term = term.strip()
                  if term and term != 'healthy':
                      diseases.add(term)

          print(f'Found {len(diseases)} disease categories in registry: {diseases}')

          # Search GEO/ArrayExpress for each disease
          for disease in sorted(diseases):
              print(f'\n--- Searching for: {disease} ---')
              subprocess.run([
                  'python3', 'dataset_search.py',
                  '--query', f'{disease} differential expression RNA-seq',
                  '--update-registry',
                  '--max-results', '10',
              ])

          # Always search for new perturbation datasets (relevant to all users)
          print('\n--- Searching for: perturbation datasets ---')
          subprocess.run([
              'python3', 'dataset_search.py',
              '--query', 'CRISPR perturbation screen gene expression',
              '--update-registry',
              '--max-results', '10',
          ])
          "

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet dataset_registry.csv; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            ADDED=$(git diff dataset_registry.csv | grep "^+" | grep -v "^+++" | wc -l)
            echo "added=$ADDED" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Update dataset registry (automated weekly scan)"
          title: "Registry update: new datasets found"
          body: |
            Automated weekly scan found new datasets via GEO/ArrayExpress search.

            The scan checked GEO and ArrayExpress for each disease already in the
            registry, plus general perturbation datasets. As users add new disease
            areas to the registry, future scans will automatically cover them.

            ~${{ steps.changes.outputs.added }} new entries added to `dataset_registry.csv`.

            Please review the new entries for accuracy before merging.
          branch: automated/registry-update
          delete-branch: true
          labels: automated
