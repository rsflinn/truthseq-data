name: Update Dataset Registry

on:
  schedule:
    # Every Monday at 8:00 UTC
    - cron: '0 8 * * 1'
  workflow_dispatch:  # Allow manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update-registry:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Delete stale PR branch
        run: git push origin --delete automated/registry-update 2>/dev/null || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas requests

      - name: Search GEO/ArrayExpress and update registry
        run: python3 update_registry_workflow.py

      - name: Verify no duplicate headers
        run: |
          HEADERS=$(grep -c "^dataset_id\|^\"dataset_id\"" dataset_registry.csv)
          echo "Header count: $HEADERS"
          if [ "$HEADERS" -gt 1 ]; then
            echo "ERROR: Multiple header rows detected. Fixing..."
            python3 -c "
          import csv, pandas as pd
          df = pd.read_csv('dataset_registry.csv')
          df = df.drop_duplicates(subset='dataset_id', keep='first')
          df.to_csv('dataset_registry.csv', index=False, quoting=csv.QUOTE_NONNUMERIC)
          print(f'Fixed: {len(df)} entries')
          "
          fi

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet dataset_registry.csv; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            ADDED=$(git diff dataset_registry.csv | grep "^+" | grep -v "^+++" | wc -l)
            echo "added=$ADDED" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Update dataset registry (automated weekly scan)"
          title: "Registry update: new datasets found"
          body: |
            Automated weekly scan found new datasets via GEO/ArrayExpress search.

            The scan checked GEO and ArrayExpress for each disease already in the
            registry, plus general perturbation datasets. Results are filtered to
            human species and datasets with 10+ samples. As users add new disease
            areas to the registry, future scans will automatically cover them.

            ~${{ steps.changes.outputs.added }} new entries added to `dataset_registry.csv`.

            Please review the new entries for accuracy before merging.
          branch: automated/registry-update
          delete-branch: true
          labels: automated
